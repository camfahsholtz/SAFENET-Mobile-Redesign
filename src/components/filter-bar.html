<!-- ============================================================
  SAFENET Filter Bar Component — snippet library
  Horizontal row of active filter chips + Filter button + results count.
  Sits between the home screen header and the report card list.

  Structure top to bottom:
    1. Chips row  — horizontally scrollable; Filter button always first
    2. Results count — quieter single line below

  Composes: Filter Chip (src/components/chip.html).
  Each chip and the Filter button use flex-shrink-0 to prevent
  compression inside the scroll container.
  ============================================================ -->


<!-- ===================================================================
  FILTER BAR — FULL INSTANCE
  Replace chip labels and N count with real data at integration time.
=================================================================== -->
<div role="region" aria-label="Report filters">

  <!-- Chips row — wraps to multiple rows when chips overflow -->
  <div class="flex flex-wrap gap-space-2 px-space-4 py-space-2">

    <!-- Filter button — always first; opens the filter editor sheet -->
    <button
      type="button"
      aria-label="Open filters"
      class="inline-flex items-center gap-space-2 h-touch-min px-space-3 rounded-none font-sans
             bg-surface-container border border-border-strong
             text-body text-text-primary whitespace-nowrap
             transition-colors
             hover:bg-surface-container-pressed
             active:bg-surface-container-pressed
             focus-visible:outline-none focus-visible:ring focus-visible:ring-action-primary focus-visible:ring-offset-2">
      <!-- Filter icon: 3 horizontal lines of decreasing width -->
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="square"
           aria-hidden="true">
        <line x1="2" y1="5" x2="18" y2="5"/>
        <line x1="5" y1="10" x2="15" y2="10"/>
        <line x1="8" y1="15" x2="12" y2="15"/>
      </svg>
      Filter
    </button>

    <!-- Active filter chips — use Filter Chip component pattern -->

    <!-- Default time filter — always present -->
    <div class="inline-flex items-center h-touch-min pl-space-3 pr-space-2 gap-space-2
                bg-surface border border-border-strong rounded-none font-sans
                transition-colors hover:bg-surface-container">
      <span class="text-body text-text-primary whitespace-nowrap">30d Window</span>
      <button type="button" aria-label="Remove 30d Window filter"
        class="w-11 h-11 flex-shrink-0 flex items-center justify-center rounded-none
               text-body-lg text-text-secondary
               transition-colors
               hover:bg-surface-container-pressed hover:text-text-primary
               focus-visible:outline-none focus-visible:ring focus-visible:ring-action-primary focus-visible:ring-offset-2">
        ×
      </button>
    </div>

    <!-- Additional active filters (render per active selection) -->
    <div class="inline-flex items-center h-touch-min pl-space-3 pr-space-2 gap-space-2
                bg-surface border border-border-strong rounded-none font-sans
                transition-colors hover:bg-surface-container">
      <span class="text-body text-text-primary whitespace-nowrap">Channels</span>
      <button type="button" aria-label="Remove Channels filter"
        class="w-11 h-11 flex-shrink-0 flex items-center justify-center rounded-none
               text-body-lg text-text-secondary
               transition-colors
               hover:bg-surface-container-pressed hover:text-text-primary
               focus-visible:outline-none focus-visible:ring focus-visible:ring-action-primary focus-visible:ring-offset-2">
        ×
      </button>
    </div>

  </div><!-- end chips row -->

  <!-- Results count -->
  <p class="px-space-4 pt-space-3 pb-space-4 text-body-sm text-text-secondary">
    Showing 24 reports from the last 30 days
  </p>

</div>
