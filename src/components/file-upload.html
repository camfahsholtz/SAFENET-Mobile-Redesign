<!-- ============================================================
  SAFENET File Upload Buttons — snippet library
  3-column grid of upload triggers (camera, photos, document).
  Below buttons: attached file rows.

  Disabled state (5-file limit reached): dashed border softens,
  text goes text-disabled, cursor-not-allowed.
  ============================================================ -->


<!-- ===================================================================
  FILE UPLOAD — EMPTY (DEFAULT)
=================================================================== -->

<!-- Upload button grid — 3-column -->
<div class="grid grid-cols-3 gap-space-2">

  <!-- Take Photo -->
  <button type="button"
    class="min-h-24 flex flex-col items-center justify-center gap-space-2 p-space-4
           bg-surface-elevated border border-dashed border-border-strong
           text-body-sm text-text-secondary font-sans
           focus-visible:outline-none focus-visible:ring focus-visible:ring-action-primary focus-visible:ring-offset-2">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true">
      <rect x="2" y="7" width="20" height="14"/>
      <circle cx="12" cy="14" r="3"/>
      <path d="M8 7l2-3h4l2 3"/>
    </svg>
    Camera
  </button>

  <!-- Choose from Photos -->
  <button type="button"
    class="min-h-24 flex flex-col items-center justify-center gap-space-2 p-space-4
           bg-surface-elevated border border-dashed border-border-strong
           text-body-sm text-text-secondary font-sans
           focus-visible:outline-none focus-visible:ring focus-visible:ring-action-primary focus-visible:ring-offset-2">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true">
      <rect x="4" y="6" width="16" height="14"/>
      <rect x="2" y="4" width="16" height="14"/>
      <line x1="6" y1="10" x2="6" y2="10"/>
      <polyline points="6,15 9,12 12,15 15,11 18,15"/>
    </svg>
    Photos
  </button>

  <!-- Upload Document -->
  <button type="button"
    class="min-h-24 flex flex-col items-center justify-center gap-space-2 p-space-4
           bg-surface-elevated border border-dashed border-border-strong
           text-body-sm text-text-secondary font-sans
           focus-visible:outline-none focus-visible:ring focus-visible:ring-action-primary focus-visible:ring-offset-2">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    Document
  </button>

</div>

<!-- Helper text -->
<p class="mt-space-2 text-body-sm text-text-secondary">Up to 5 files. JPG, GIF, PNG, PDF, DOC, DOCX, TXT.</p>


<!-- ===================================================================
  FILE UPLOAD — DISABLED (5-file limit reached)
=================================================================== -->

<div class="grid grid-cols-3 gap-space-2">

  <button type="button" disabled
    class="min-h-24 flex flex-col items-center justify-center gap-space-2 p-space-4
           bg-surface-elevated border border-dashed border-border
           text-body-sm text-text-disabled font-sans
           cursor-not-allowed">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true">
      <rect x="2" y="7" width="20" height="14"/>
      <circle cx="12" cy="14" r="3"/>
      <path d="M8 7l2-3h4l2 3"/>
    </svg>
    Camera
  </button>

  <button type="button" disabled
    class="min-h-24 flex flex-col items-center justify-center gap-space-2 p-space-4
           bg-surface-elevated border border-dashed border-border
           text-body-sm text-text-disabled font-sans
           cursor-not-allowed">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true">
      <rect x="4" y="6" width="16" height="14"/>
      <rect x="2" y="4" width="16" height="14"/>
      <line x1="6" y1="10" x2="6" y2="10"/>
      <polyline points="6,15 9,12 12,15 15,11 18,15"/>
    </svg>
    Photos
  </button>

  <button type="button" disabled
    class="min-h-24 flex flex-col items-center justify-center gap-space-2 p-space-4
           bg-surface-elevated border border-dashed border-border
           text-body-sm text-text-disabled font-sans
           cursor-not-allowed">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    Document
  </button>

</div>

<p class="mt-space-2 text-body-sm text-text-secondary">5/5 files attached. Remove a file to upload more.</p>
