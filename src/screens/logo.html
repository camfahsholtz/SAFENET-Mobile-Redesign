<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAFENET Logo</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 96px;
      height: 96px;
      background: #1f3d2b;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Thin inner border inset */
    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1.5px solid rgba(255,255,255,0.25);
      pointer-events: none;
    }

    .logo-mark svg {
      width: 58px;
      height: 42px;
    }

    .logo-wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #1f3d2b;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.8px;
      color: #424843;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">

    <!-- Square mark with SN monogram -->
    <div class="logo-mark">
      <svg viewBox="0 0 58 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- S -->
        <path d="M4 10 C4 6.5 7 4 11 4 L19 4 C23 4 26 6.5 26 10 C26 13.5 23 15.5 19 16.5 L13 18 C9 19 6 21.5 6 25.5 C6 29.5 9 32 13 32 L22 32 C26 32 29 29.5 29 26"
              stroke="white" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
        <!-- N -->
        <path d="M33 4 L33 32 M33 4 L53 32 M53 4 L53 32"
              stroke="white" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
      </svg>
    </div>

    <!-- Wordmark -->
    <div class="logo-wordmark">
      <span class="logo-name">SAFENET</span>
      <span class="logo-sub">National Interagency Fire Center</span>
    </div>

  </div>
</body>
</html>
